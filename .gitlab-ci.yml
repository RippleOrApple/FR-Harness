stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install ".[dev]"
  script:
    - python -m pytest -v

docker-build:
  stage: build
  image: docker:29-cli
  services:
    - name: docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
